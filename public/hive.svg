<svg xmlns="http://www.w3.org/2000/svg" viewBox="-300 -300 600 600" width="100%" height="100%">
  <defs>
    <!-- Define a single, perfectly rounded flat-topped hexagon -->
    <path id="hexagon" 
          d="M 89,19 
             L 61,68 
             Q 50,87 28,87 
             L -28,87 
             Q -50,87 -61,68 
             L -89,19 
             Q -100,0 -89,-19 
             L -61,-68 
             Q -50,-87 -28,-87 
             L 28,-87 
             Q 50,-87 61,-68 
             L 89,-19 
             Q 100,0 89,19 
             Z" />
  </defs>

  <!-- 
    The Honeycomb Group
    Change 'fill' to any color (e.g. 'currentColor' for Tailwind, or '#f59e0b' for Honey Gold!)
  -->
  <g fill="#000000">
    <!-- Center Hexagon -->
    <use href="#hexagon" x="0" y="0" />
    
    <!-- Outer Hexagons -->
    <use href="#hexagon" x="0" y="-185" />
    <use href="#hexagon" x="160.2" y="-92.5" />
    <use href="#hexagon" x="160.2" y="92.5" />
    <use href="#hexagon" x="0" y="185" />
    <use href="#hexagon" x="-160.2" y="92.5" />
    <use href="#hexagon" x="-160.2" y="-92.5" />
  </g>
</svg>
